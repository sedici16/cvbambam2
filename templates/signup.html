<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV Bam Bam | Sign Up</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center font-sans">
    <div class="w-full max-w-md px-6">

        <div class="text-center mb-8">
            <a href="/" class="text-blue-600 font-bold text-2xl"><i class="fa-solid fa-bolt mr-2"></i>CV Bam Bam</a>
            <p class="text-gray-400 text-sm mt-1">Create your free account</p>
        </div>

        <div id="verifyMsg" class="hidden mb-6 bg-green-50 border border-green-200 rounded-2xl p-6 text-center">
            <i class="fas fa-envelope-open-text text-green-500 text-3xl mb-3"></i>
            <p class="text-green-800 font-bold text-lg">Check your email</p>
            <p class="text-green-600 text-sm mt-1">We've sent a verification link to your inbox. Click it to activate your account.</p>
        </div>

        <div id="formCard" class="bg-white rounded-2xl shadow-sm border border-gray-200 p-8">

            <div class="bg-blue-50 border border-blue-100 rounded-xl px-4 py-3 text-sm text-blue-700 mb-5">
                <i class="fa-solid fa-gift mr-1"></i> Free plan includes <strong>10 CVs</strong> to get started.
            </div>

            <div id="errorBox" class="hidden mb-4 bg-red-50 border border-red-200 text-red-700 rounded-lg px-4 py-3 text-sm"></div>

            <form id="signupForm" class="space-y-5">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Email</label>
                    <input type="email" name="email" required placeholder="you@example.com"
                        class="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Password</label>
                    <input type="password" name="password" required placeholder="Min. 6 characters"
                        class="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
                </div>
                <button type="submit"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 rounded-xl transition">
                    Create Account
                </button>
            </form>
        </div>

        <p class="text-center text-sm text-gray-500 mt-5">
            Already have an account? <a href="/login" class="text-blue-600 font-semibold hover:underline">Sign in</a>
        </p>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        if (params.get('verify') === '1') {
            document.getElementById('formCard').classList.add('hidden');
            document.getElementById('verifyMsg').classList.remove('hidden');
        }

        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = new FormData(e.target);
            const res = await fetch('/auth/signup', { method: 'POST', body: data });
            if (res.redirected) {
                window.location.href = res.url;
            } else if (!res.ok) {
                const err = await res.json();
                const box = document.getElementById('errorBox');
                box.textContent = err.detail;
                box.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
