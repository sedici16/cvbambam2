<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV Bam Bam | Settings</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 min-h-screen font-sans">

    <nav class="bg-white border-b border-gray-200 px-6 py-4 flex items-center justify-between">
        <a href="/" class="flex items-center gap-2 text-blue-600 font-bold text-xl">
            <i class="fa-solid fa-bolt"></i> CV Bam Bam
        </a>
        <div class="flex items-center gap-4">
            <a href="/app" class="text-sm text-gray-500 hover:text-blue-600 transition">← Back to App</a>
            <form method="POST" action="/auth/logout">
                <button class="text-sm text-gray-400 hover:text-red-500 transition"><i class="fa-solid fa-right-from-bracket"></i></button>
            </form>
        </div>
    </nav>

    <main class="max-w-md mx-auto px-6 py-10">

        <h1 class="text-2xl font-bold text-gray-800 mb-8">Settings</h1>

        <div class="bg-white rounded-2xl border border-gray-200 shadow-sm p-8">
            <h2 class="text-base font-bold text-gray-700 mb-5"><i class="fa-solid fa-lock mr-2 text-blue-500"></i>Change Password</h2>

            <div id="errorBox" class="hidden mb-4 bg-red-50 border border-red-200 text-red-700 rounded-lg px-4 py-3 text-sm"></div>
            <div id="successBox" class="hidden mb-4 bg-green-50 border border-green-200 text-green-700 rounded-lg px-4 py-3 text-sm"></div>

            <form id="changePasswordForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Current Password</label>
                    <input type="password" name="current_password" required placeholder="••••••••"
                        class="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">New Password</label>
                    <input type="password" name="new_password" required placeholder="Min. 6 characters"
                        class="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Confirm New Password</label>
                    <input type="password" name="confirm_password" required placeholder="••••••••"
                        class="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400">
                </div>
                <button type="submit"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 rounded-xl transition">
                    Update Password
                </button>
            </form>
        </div>
    </main>

    <script>
        document.getElementById('changePasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const form = e.target;
            const current = form.current_password.value;
            const newPass = form.new_password.value;
            const confirm = form.confirm_password.value;

            hideMessages();

            if (newPass !== confirm) return showError('New passwords do not match.');
            if (newPass.length < 6) return showError('Password must be at least 6 characters.');

            const data = new FormData();
            data.append('current_password', current);
            data.append('new_password', newPass);

            const res = await fetch('/auth/change-password', { method: 'POST', body: data });
            const result = await res.json();

            if (!res.ok) return showError(result.detail);
            showSuccess('Password updated successfully.');
            form.reset();
        });

        function showError(msg) {
            const el = document.getElementById('errorBox');
            el.textContent = msg;
            el.classList.remove('hidden');
        }

        function showSuccess(msg) {
            const el = document.getElementById('successBox');
            el.textContent = msg;
            el.classList.remove('hidden');
        }

        function hideMessages() {
            document.getElementById('errorBox').classList.add('hidden');
            document.getElementById('successBox').classList.add('hidden');
        }
    </script>

</body>
</html>
